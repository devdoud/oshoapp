name: osho
description: "A new Flutter project."


publish_to: 'none' 




version: 1.0.0+1

environment:
  sdk: ^3.6.0



dependencies:
  flutter:
    sdk: flutter

  # Utility Packages
  http: ^1.3.0
  intl: ^0.20.2
  logger: ^2.5.0
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.6
  smooth_page_indicator: ^1.2.1
  dotted_line: ^3.2.3
  carousel_slider: ^5.1.1
  connectivity_plus: ^7.0.0
  lottie: ^3.3.2
  flutter_stripe: ^11.4.0


  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

  # measurements
  camera: ^0.11.1
  google_mlkit_pose_detection: ^0.11.0
  path_provider: ^2.1.5
  image_picker: ^1.0.7
  provider: ^6.1.5
  audioplayers: ^6.5.0

  # State Management
  get: ^4.7.2
  get_storage: ^2.1.1
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  google_sign_in: ^6.1.6
  shimmer: ^3.0.0
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  
  
  
  
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/launchericon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  #--------- LOCAL ASSSETS -----------#
  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/on_boarding_images/
    - assets/images/measurement/
    - assets/images/modelfashion/
    - assets/images/store/
    - .env

  #-------- LOCAL FONTS -------------#
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/dmsans/bold.ttf
          weight: 700
        - asset: assets/fonts/dmsans/regular.ttf
          weight: 400
        - asset: assets/fonts/dmsans/medium.ttf
          weight: 500

  
